[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
addopts =
    --browser chromium
    --screenshot only-on-failure
    --video retain-on-failure
    --tracing retain-on-failure
    --output test-results
    --html=playwright-report/report.html
    --self-contained-html
    -ra
markers =
    smoke: 主路徑煙霧測試
    api: 純 API 層測試（不依賴 page fixture）
